databaseChangeLog:
  - changeSet:
      id: create-user-table-v1.0.0
      author: gustavo.alexis.ra@gmail.com
      changes:
        - tagDatabase:
            tag: v1.0.0
        - createTable:
            schemaName: public
            tableName: "user"
            columns:
              - column:
                  name: id
                  type: UUID
                  remarks: "user unique ID"
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    nullable: false
                    primaryKey: true
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  remarks: "user name"
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  remarks: "user email address"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  remarks: "when the record was created"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  remarks: "when the record was updated"
              - column:
                  name: enabled
                  type: BOOLEAN
                  remarks: "enable the record"
                  defaultValueBoolean: true
      rollback:
        - dropTable:
            schemaName: public
            cascadeConstraints: true
            tableName: "user"

