databaseChangeLog:
  - changeSet:
      id: create-user-table-v1.0.0
      author: gustavo.alexis.ra@gmail.com
      changes:
        - tagDatabase:
            tag: v1.0.0
        - createTable:
            schemaName: public
            tableName: "user"
            columns:
              - column:
                  name: id
                  type: UUID
                  remarks: "user unique ID"
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    nullable: false
                    primaryKey: true
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  remarks: "user name"
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  remarks: "user email address"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  remarks: "when the record was created"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  remarks: "when the record was updated"
              - column:
                  name: enabled
                  type: BOOLEAN
                  remarks: "enable the record"
                  defaultValueBoolean: true
      rollback:
        - dropTable:
            schemaName: public
            cascadeConstraints: true
            tableName: "user"

  - changeSet:
      id: create-role-table-v1.0.1
      author: gustavo.alexis.ra@gmail.com
      changes:
        - tagDatabase:
            tag: v1.0.1
        - createTable:
            schemaName: public
            tableName: role
            columns:
              - column:
                  name: id
                  type: UUID
                  remarks: "role unique ID"
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    nullable: false
                    primaryKey: true
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  remarks: "role name"
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  remarks: "when the record was created"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  remarks: "when the record was updated"
              - column:
                  name: enabled
                  type: BOOLEAN
                  remarks: "enable the record"
                  defaultValueBoolean: true
        - insert:
            schemaName: public
            tableName: role
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: ROOT_ADMIN
              - column:
                  name: enabled
                  valueBoolean: true
        - insert:
            schemaName: public
            tableName: role
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: SALES_AGENT
              - column:
                  name: enabled
                  valueBoolean: true
        - insert:
            schemaName: public
            tableName: role
            columns:
              - column:
                  name: id
                  valueComputed: "gen_random_uuid()"
              - column:
                  name: name
                  value: MANAGER
              - column:
                  name: enabled
                  valueBoolean: true
      rollback:
        - delete:
            schemaName: public
            tableName: role
            where: "name IN ('ROOT_ADMIN', 'SALES_AGENT', 'MANAGER')"
        - dropTable:
            schemaName: public
            cascadeConstraints: true
            tableName: role

  - changeSet:
      id: create-user-role-table-v1.0.2
      author: gustavo.alexis.ra@gmail.com
      changes:
        - tagDatabase:
            tag: v1.0.2
        - createTable:
            schemaName: public
            tableName: user_role
            columns:
              - column:
                  name: id
                  type: UUID
                  remarks: "user_role unique ID"
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    nullable: false
                    primaryKey: true
                    unique: true
              - column:
                  name: id_user
                  type: UUID
                  remarks: "user id"
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_user
                    referencedTableName: "user"
                    referencedColumnNames: id
              - column:
                  name: id_role
                  type: UUID
                  remarks: "role id"
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_role_role
                    referencedTableName: role
                    referencedColumnNames: id
              - column:
                  name: created_at
                  type: TIMESTAMP
                  remarks: "when the record was created"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  remarks: "when the record was updated"
              - column:
                  name: enabled
                  type: BOOLEAN
                  remarks: "enable the record"
                  defaultValueBoolean: true
      rollback:
        - dropTable:
            schemaName: public
            cascadeConstraints: true
            tableName: user_role

  - changeSet:
      id: create-otp-code-table-v1.0.3
      author: gustavo.alexis.ra@gmail.com
      changes:
        - tagDatabase:
            tag: v1.0.3
        - createTable:
            schemaName: public
            tableName: otp_code
            columns:
              - column:
                  name: id
                  type: UUID
                  remarks: "otp_code unique ID"
                  defaultValueComputed: "gen_random_uuid()"
                  constraints:
                    nullable: false
                    primaryKey: true
                    unique: true
              - column:
                  name: user_id
                  type: UUID
                  remarks: "user id"
                  constraints:
                    nullable: false
                    foreignKeyName: fk_otp_code_user
                    referencedTableName: "user"
                    referencedColumnNames: id
              - column:
                  name: otp_code
                  type: VARCHAR(6)
                  remarks: "6-character alphanumeric OTP code"
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  remarks: "expiration timestamp in UTC"
                  constraints:
                    nullable: false
              - column:
                  name: is_used
                  type: BOOLEAN
                  remarks: "whether the OTP has been consumed"
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  remarks: "when the record was created"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            schemaName: public
            cascadeConstraints: true
            tableName: otp_code

  - changeSet:
      id: seed-user-admin-v1.0.4
      author: gustavo.alexis.ra@gmail.com
      changes:
        - tagDatabase:
            tag: v1.0.4
        - sql:
            sql: |
              INSERT INTO public."user" (id, name, email, enabled) VALUES (gen_random_uuid(), 'Admin', 'user1@gmail.com', true);
              INSERT INTO public.user_role (id, id_user, id_role, enabled) VALUES (gen_random_uuid(), (SELECT id FROM public."user" WHERE email = 'user1@gmail.com'), (SELECT id FROM public.role WHERE name = 'ROOT_ADMIN'), true);
      rollback:
        - sql:
            sql: |
              DELETE FROM public.user_role WHERE id_user IN (SELECT id FROM public."user" WHERE email = 'user1@gmail.com');
              DELETE FROM public.user WHERE email = 'user1@gmail.com';
  
  - changeSet:
      id: create-business-tables-v1.0.5
